version: '3.8'

services:
  # --- Database: PostgreSQL ---
  db:
    image: postgres:15-alpine
    container_name: legal_db
    restart: always
    environment:
      POSTGRES_USER: legal_user
      POSTGRES_PASSWORD: legal_password
      POSTGRES_DB: legal_platform
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # --- Storage: MinIO (S3 Compatible) ---
  minio:
    image: minio/minio
    container_name: legal_storage
    restart: always
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000" # API port
      - "9001:9001" # Console port
    volumes:
      - minio_data:/data

  # --- Redis (Task Queue) ---
  redis:
    image: redis:alpine
    container_name: legal_queue
    restart: always
    ports:
      - "6379:6379"

volumes:
  postgres_data:
  minio_data:
